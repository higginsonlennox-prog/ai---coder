<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Coder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d11;
  --surface: #13131a;
  --surface2: #1a1a24;
  --surface3: #202030;
  --border: #252535;
  --border2: #30304a;
  --text: #e2e0f0;
  --text2: #8884a8;
  --text3: #48465a;
  --accent: #7c6af7;
  --accent-hover: #9080ff;
  --accent-light: #1e1a40;
  --green: #3ecf8e;
  --red: #f06060;
  --yellow: #f0c060;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Sidebar ── */
.layout { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.2s ease;
}

.sidebar.collapsed { width: 0; overflow: hidden; }

.sidebar-top {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.logo-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}

.new-chat-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  transition: background 0.15s;
  text-align: left;
  display: flex; align-items: center; gap: 6px;
}
.new-chat-btn:hover { background: var(--accent-hover); }

/* Session list */
.sessions {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem;
}

.session-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  gap: 8px;
  transition: background 0.1s;
}
.session-item:hover, .session-item.active {
  background: var(--surface2);
  color: var(--text);
}
.session-item .s-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-del {
  background: none; border: none;
  color: var(--text3); font-size: 14px;
  cursor: pointer; padding: 2px 4px;
  border-radius: 4px; opacity: 0;
  transition: opacity 0.1s, color 0.1s;
}
.session-item:hover .session-del { opacity: 1; }
.session-del:hover { color: var(--red); }

/* API key section */
.sidebar-bottom {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.key-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.key-input-row { display: flex; gap: 6px; }

.key-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 12px;
  font-family: monospace;
  padding: 6px 8px;
  outline: none;
  min-width: 0;
}
.key-input:focus { border-color: var(--accent); }

.key-save-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.key-save-btn:hover { background: var(--surface3); color: var(--text); }

.key-link {
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
}
.key-link:hover { text-decoration: underline; }

.key-status { font-size: 11px; color: var(--green); display: none; }

/* ── Main area ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Topbar */
.topbar {
  height: 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1rem;
  gap: 10px;
  flex-shrink: 0;
  background: var(--surface);
}

.toggle-sidebar {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  transition: color 0.15s;
}
.toggle-sidebar:hover { color: var(--text); }

.chat-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.model-badge {
  font-size: 11px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid #3d3080;
  border-radius: 20px;
  padding: 3px 10px;
}

/* ── Chat ── */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  scroll-behavior: smooth;
}

/* Welcome screen */
.welcome {
  max-width: 620px;
  margin: auto;
  text-align: center;
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.welcome-icon {
  width: 56px; height: 56px;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}

.welcome h2 { font-size: 22px; font-weight: 500; color: var(--text); }
.welcome p  { font-size: 14px; color: var(--text2); line-height: 1.7; }

.chips {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-top: 0.5rem;
}
.chip {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Messages */
.msg { display: flex; gap: 10px; max-width: 860px; width: 100%; margin: 0 auto; }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  flex-shrink: 0; margin-top: 2px;
}
.avatar.ai  { background: var(--accent-light); color: var(--accent); border: 1px solid #3d3080; }
.avatar.usr { background: #1a2a1a; color: var(--green); border: 1px solid #2a4028; }

.bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.75rem 1rem;
  font-size: 14px;
  line-height: 1.7;
  max-width: calc(100% - 40px);
  word-break: break-word;
  overflow: hidden;
}

.msg.user .bubble {
  background: var(--surface2);
  border-color: var(--border2);
}

/* Markdown inside bubble */
.bubble p { margin-bottom: 0.5rem; }
.bubble p:last-child { margin-bottom: 0; }
.bubble h1 { font-size: 17px; font-weight: 500; color: var(--text); margin: 0.75rem 0 0.4rem; }
.bubble h2 { font-size: 15px; font-weight: 500; color: var(--text); margin: 0.75rem 0 0.4rem; }
.bubble h3 { font-size: 14px; font-weight: 500; color: var(--text2); margin: 0.5rem 0 0.3rem; }
.bubble ul, .bubble ol { padding-left: 1.4rem; margin: 0.4rem 0; }
.bubble li { margin-bottom: 3px; }
.bubble strong { color: #c9b8ff; font-weight: 500; }
.bubble a { color: var(--accent); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }

.bubble code:not(pre code) {
  background: #1e1e2e;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 12.5px;
  color: #c9b8ff;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}

.bubble pre {
  margin: 0.75rem 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border2);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a28;
  padding: 7px 12px;
  font-size: 11px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  font-family: monospace;
  letter-spacing: 0.3px;
}

.copy-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 5px;
  padding: 2px 9px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: sans-serif;
}
.copy-btn:hover { background: var(--surface3); color: var(--text); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

.bubble pre code {
  display: block;
  padding: 0.9rem 1rem;
  font-size: 13px;
  line-height: 1.6;
  overflow-x: auto;
  background: #11111c !important;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
}

/* Image in bubble */
.bubble img.uploaded-img {
  max-width: 200px;
  max-height: 150px;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
  margin-bottom: 8px;
  object-fit: cover;
}

/* Typing indicator */
.thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: blink 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,100%{opacity:.2;transform:scale(.75)} 50%{opacity:1;transform:scale(1)} }

/* ── Input area ── */
.input-area {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 0.75rem 1rem 0.875rem;
  flex-shrink: 0;
}

.img-previews {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 8px;
}

.img-thumb {
  position: relative;
  width: 52px; height: 52px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border2);
}
.img-thumb img { width:100%;height:100%;object-fit:cover;display:block; }
.img-thumb .rm {
  position: absolute; top: 2px; right: 2px;
  width: 16px; height: 16px;
  background: rgba(0,0,0,.8);
  border: none; border-radius: 50%;
  color: #fff; font-size: 10px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}

.input-row { display: flex; gap: 8px; align-items: flex-end; }

.input-wrap {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: flex-end; gap: 4px;
  padding: 7px 8px;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: var(--accent); }

#msg-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 160px;
  overflow-y: auto;
  padding: 2px 2px;
  font-family: inherit;
}
#msg-input::placeholder { color: var(--text3); }

.icon-btn {
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  padding: 4px 5px; border-radius: 6px;
  font-size: 16px; line-height: 1;
  transition: color 0.15s; flex-shrink: 0;
}
.icon-btn:hover { color: var(--accent); }

#file-input { display: none; }

.send-btn {
  background: var(--accent);
  border: none; color: #fff;
  border-radius: 10px;
  width: 40px; height: 40px;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, opacity 0.15s;
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.input-hint {
  font-size: 11px; color: var(--text3);
  margin-top: 5px; text-align: center;
}

/* ── No key warning ── */
.no-key-banner {
  background: #2a1a0a;
  border: 1px solid #5a3a10;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--yellow);
  margin-bottom: 8px;
  display: none;
}

/* ── Mobile ── */
@media (max-width: 640px) {
  .sidebar { display: none; }
  .sidebar.mobile-open { display: flex; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; width: 260px; }
}
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">💻</div>
        <span class="logo-text">AI Coder</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
    </div>

    <div class="sessions" id="sessions"></div>

    <div class="sidebar-bottom">
      <div class="key-label">Anthropic API Key</div>
      <div class="key-input-row">
        <input type="password" class="key-input" id="api-key-input" placeholder="sk-ant-..."/>
        <button class="key-save-btn" onclick="saveKey()">Save</button>
      </div>
      <a class="key-link" href="https://console.anthropic.com/settings/keys" target="_blank">↗ Get a free key</a>
      <div class="key-status" id="key-status">✓ Key saved</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <div class="chat-title" id="chat-title">New chat</div>
      <div class="model-badge">claude-sonnet-4</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <div class="no-key-banner" id="no-key-banner">
        ⚠ No API key set. Add your Anthropic key in the sidebar →
        <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--yellow);margin-left:6px;">Get one free</a>
      </div>
      <div class="img-previews" id="img-previews"></div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Ask me to write, fix, or explain any code…" rows="1"></textarea>
          <button class="icon-btn" title="Upload image" onclick="document.getElementById('file-input').click()">📷</button>
          <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)"/>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">▶</button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; 📷 to upload an image</div>
    </div>
  </div>
</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('aicoder_key') || '';
let sessions = JSON.parse(localStorage.getItem('aicoder_sessions') || '[]');
let currentId = null;
let isLoading = false;
let pendingImages = [];

const chatEl    = document.getElementById('chat');
const input     = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const previewEl = document.getElementById('img-previews');
const sessEl    = document.getElementById('sessions');

// ── Init ──
if (apiKey) {
  document.getElementById('api-key-input').value = '•'.repeat(20);
  document.getElementById('key-status').style.display = 'block';
}

function init() {
  renderSessions();
  if (sessions.length > 0) {
    loadSession(sessions[sessions.length - 1].id);
  } else {
    newChat();
  }
  checkKey();
}

// ── API Key ──
function saveKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v || v.includes('•')) return;
  apiKey = v;
  localStorage.setItem('aicoder_key', v);
  document.getElementById('api-key-input').value = '•'.repeat(20);
  document.getElementById('key-status').style.display = 'block';
  checkKey();
}

function checkKey() {
  document.getElementById('no-key-banner').style.display = apiKey ? 'none' : 'block';
}

// ── Sessions ──
function newChat() {
  const id = Date.now().toString();
  const session = { id, title: 'New chat', history: [] };
  sessions.push(session);
  saveSessions();
  loadSession(id);
}

function loadSession(id) {
  currentId = id;
  const s = getSession(id);
  if (!s) return;
  document.getElementById('chat-title').textContent = s.title;
  renderSessions();
  renderChat(s.history);
}

function getSession(id) {
  return sessions.find(s => s.id === id);
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentId === id) {
    if (sessions.length > 0) loadSession(sessions[sessions.length - 1].id);
    else newChat();
  } else {
    renderSessions();
  }
}

function saveSessions() {
  // Keep only last 30 sessions, trim old history for storage
  if (sessions.length > 30) sessions = sessions.slice(-30);
  localStorage.setItem('aicoder_sessions', JSON.stringify(sessions));
  renderSessions();
}

function renderSessions() {
  sessEl.innerHTML = '';
  const sorted = [...sessions].reverse();
  sorted.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.id === currentId ? ' active' : '');
    el.innerHTML = `<span class="s-title">${escapeHtml(s.title)}</span><button class="session-del" onclick="deleteSession('${s.id}', event)" title="Delete">✕</button>`;
    el.addEventListener('click', () => loadSession(s.id));
    sessEl.appendChild(el);
  });
}

function updateTitle(text) {
  const s = getSession(currentId);
  if (!s || s.title !== 'New chat') return;
  s.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
  document.getElementById('chat-title').textContent = s.title;
  saveSessions();
}

// ── Images ──
function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const result = e.target.result;
      pendingImages.push({ base64: result.split(',')[1], mediaType: file.type, url: result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('file-input').value = '';
}

function renderPreviews() {
  previewEl.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const d = document.createElement('div');
    d.className = 'img-thumb';
    d.innerHTML = `<img src="${img.url}"/><button class="rm" onclick="removeImg(${i})">✕</button>`;
    previewEl.appendChild(d);
  });
}

function removeImg(i) { pendingImages.splice(i, 1); renderPreviews(); }

// ── Send ──
async function sendMessage() {
  if (isLoading) return;
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;

  if (!apiKey) {
    document.getElementById('no-key-banner').style.display = 'block';
    document.getElementById('api-key-input').focus();
    return;
  }

  const s = getSession(currentId);
  if (!s) return;

  // Hide welcome if visible
  const w = document.getElementById('welcome');
  if (w) w.remove();

  // Build content
  const imgCopy = [...pendingImages];
  const userContent = [];
  imgCopy.forEach(img => userContent.push({ type:'image', source:{ type:'base64', media_type: img.mediaType, data: img.base64 }}));
  if (text) userContent.push({ type:'text', text });

  // Add to history
  s.history.push({ role:'user', content: userContent });
  saveSessions();
  updateTitle(text || 'Image');

  // Show in UI
  appendUserBubble(text, imgCopy);

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  pendingImages = [];
  renderPreviews();

  // Loading
  isLoading = true;
  sendBtn.disabled = true;
  const thinkEl = appendThinking();

  try {
    // Build messages (strip image data from old messages to save tokens)
    const messages = s.history.map((m, i) => {
      if (i === s.history.length - 1) return m; // keep latest full
      if (typeof m.content === 'string') return m;
      // For older messages, strip image data
      const content = m.content.map(c => {
        if (c.type === 'image') return { type:'text', text:'[image]' };
        return c;
      });
      return { ...m, content };
    });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        system: `You are an expert software engineer and AI coding assistant. Your sole purpose is to help users write, debug, review, and understand code.

Core rules:
- Always write complete, working, production-quality code
- Specify the language after triple backticks for syntax highlighting (e.g. \`\`\`python, \`\`\`javascript, \`\`\`bash)
- When given an image (screenshot, mockup, error, diagram), analyze it and write the appropriate code
- For bugs: explain the cause clearly, then provide the fixed code
- For new features: write the full implementation, not just snippets
- Add brief comments in code to explain non-obvious logic
- Suggest improvements when you spot issues beyond what's asked
- Support all languages: Python, JavaScript, TypeScript, Rust, Go, C/C++, Java, SQL, Bash, HTML/CSS, and more`,
        messages
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    const aiText = data.content?.map(b => b.text||'').join('') || 'No response.';

    thinkEl.remove();
    appendAIBubble(aiText);

    s.history.push({ role:'assistant', content: aiText });
    saveSessions();

  } catch(err) {
    thinkEl.remove();
    appendAIBubble(`**Error:** ${err.message}\n\nCheck your API key in the sidebar or visit [console.anthropic.com](https://console.anthropic.com) to verify your account.`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── Render chat ──
function renderChat(history) {
  chatEl.innerHTML = '';
  if (history.length === 0) {
    showWelcome();
    return;
  }
  history.forEach(msg => {
    if (msg.role === 'user') {
      const text = typeof msg.content === 'string' ? msg.content :
        (msg.content.find(c => c.type === 'text')?.text || '');
      const imgs = typeof msg.content === 'string' ? [] :
        msg.content.filter(c => c.type === 'image').map(c => ({ url: null, b64: c.source.data, mt: c.source.media_type }));
      appendUserBubble(text, imgs, true);
    } else {
      const text = typeof msg.content === 'string' ? msg.content : '';
      if (text) appendAIBubble(text);
    }
  });
}

function showWelcome() {
  const w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = `
    <div class="welcome-icon">💻</div>
    <h2>What do you want to build?</h2>
    <p>Write, fix, explain, and improve code in any language.<br>Upload screenshots, mockups, or error messages too.</p>
    <div class="chips">
      <div class="chip" onclick="chip(this)">Build a REST API in Python</div>
      <div class="chip" onclick="chip(this)">Write a React component from scratch</div>
      <div class="chip" onclick="chip(this)">Fix a bug in my code</div>
      <div class="chip" onclick="chip(this)">Write a SQL query with joins</div>
      <div class="chip" onclick="chip(this)">Create a Discord bot in JavaScript</div>
      <div class="chip" onclick="chip(this)">Explain this code to me</div>
      <div class="chip" onclick="chip(this)">Write a Bash script to automate backups</div>
      <div class="chip" onclick="chip(this)">Build a CLI tool in Go</div>
    </div>`;
  chatEl.appendChild(w);
}

function chip(el) {
  input.value = el.textContent;
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function appendUserBubble(text, images, isHistory) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  let imgHtml = '';
  if (images) {
    images.forEach(img => {
      const src = img.url || (img.base64 ? `data:${img.mediaType};base64,${img.base64}` : null);
      if (src) imgHtml += `<img class="uploaded-img" src="${src}"/>`;
    });
  }
  msg.innerHTML = `
    <div class="bubble">${imgHtml}${text ? escapeHtml(text).replace(/\n/g,'<br/>') : ''}</div>
    <div class="avatar usr">U</div>`;
  chatEl.appendChild(msg);
  if (!isHistory) scrollBottom();
}

function appendThinking() {
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.innerHTML = `<div class="avatar ai">AI</div><div class="bubble"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatEl.appendChild(msg);
  scrollBottom();
  return msg;
}

function appendAIBubble(md) {
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.innerHTML = `<div class="avatar ai">AI</div><div class="bubble">${renderMd(md)}</div>`;
  chatEl.appendChild(msg);
  msg.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
    const pre = block.parentElement;
    const lang = (block.className.match(/language-(\w+)/) || [])[1] || 'code';
    const header = document.createElement('div');
    header.className = 'code-header';
    header.innerHTML = `<span>${lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button>`;
    pre.insertBefore(header, pre.firstChild);
  });
  scrollBottom();
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Markdown renderer ──
function renderMd(md) {
  md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="language-${lang||'plaintext'}">${escapeHtml(code.trim())}</code></pre>`);
  md = md.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  md = md.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  md = md.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  md = md.replace(/^\* (.+)$/gm,  '<li>$1</li>');
  md = md.replace(/^- (.+)$/gm,   '<li>$1</li>');
  md = md.replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`);
  md = md.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  md = md.replace(/\n\n(?!<[uolh\/])/g, '</p><p>');
  md = md.replace(/\n(?!<[uolh\/])/g, '<br/>');
  return `<p>${md}</p>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 50);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── Input auto-resize ──
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Boot ──
init();
</script>
</body>
</html>
